title: TU/e Presentation Themes
version: 2.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:

    # Reveal.js (HTML)
    revealjs:
      theme: simple
      width: 1600
      height: 900
      margin: 0
      slide-number: true
      progress: true
      hash: true
      transition: slide
      view: slide
      center: false
      smaller: false
      title-slide: false
      controls: true
      css:
        - assets/tue-reveal.css
      filters:
        - title-slide.lua
      format-resources:
        - assets/tue-reveal.css
        - assets/tue-logo-white.png
        - assets/tue-logo-scarlet.png
        - assets/tue-cover-background.jpg

    # LaTeX / Beamer (PDF)
    beamer:
      documentclass: beamer
      classoption:
        - t
        - aspectratio=169
      pdf-engine: pdflatex
      title-slide: false
      slide-level: 2
      include-before-body:
        - before-body.tex
      format-resources:
        - assets/beamerthemetue2018.sty
        - assets/beamercolorthemetue2018plain.sty
        - assets/beamerfontthemetue2018plain.sty
        - assets/beamerouterthemetue2018plain.sty
        - assets/TUe-logo-descriptor-line-scarlet-rgb.pdf
        - assets/TUe-logo-descriptor-stack-white.pdf
        - assets/TUe-logo-scarlet-rgb.pdf
        - assets/TUe-logo-white.pdf
